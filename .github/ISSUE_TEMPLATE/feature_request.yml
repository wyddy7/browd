name: Feature request
description: Suggest a new capability for Browd.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Browd's scope is intentionally narrow: a browser-resident agent that runs in your own session. Requests that fit that shape are easier to accept; requests that drift toward "build a full cloud-side platform" or "ship a new LLM provider integration" will usually be declined or deferred.

  - type: textarea
    id: use_case
    attributes:
      label: Concrete use case
      description: Describe one specific scenario where you'd reach for this feature. Avoid general "would be cool if" framing.
      placeholder: "When I run a multi-step LinkedIn outreach task, Browd needs to wait for me to manually approve each send. I'd like a per-task 'auto-send' toggle that skips the approval gate for trusted task types."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: What you'd like Browd to do
      placeholder: "Add an Options → Approval Policy panel where I can list patterns (e.g. `send_message_at` on `linkedin.com`) that bypass the approval gate."
    validations:
      required: true

  - type: textarea
    id: current_workaround
    attributes:
      label: What you do today instead
      description: Skip if no workaround exists.
      placeholder: "I click 'Approve' manually each time, or set up a click-through script."
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about and why they don't fit.
    validations:
      required: false

  - type: dropdown
    id: agent_mode_scope
    attributes:
      label: Which agent mode should this affect?
      options:
        - "Unified only"
        - "Legacy only"
        - "Both"
        - "Not mode-specific"
    validations:
      required: false
