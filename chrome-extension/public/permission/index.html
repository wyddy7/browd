<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Microphone Permission</title>
    <style>
      :root {
        --surface-000: hsl(48 30% 98%);
        --surface-100: hsl(48 30% 98%);
        --surface-200: hsl(45 22% 95%);
        --surface-300: hsl(45 18% 91%);
        --text-100: hsl(40 3% 11%);
        --text-300: hsl(45 3% 38%);
        --border: hsl(45 14% 85% / 0.6);
        --control: hsl(45 22% 95%);
        --control-hover: hsl(45 18% 91%);
        --info: hsl(215 60% 48%);
        --success: hsl(150 50% 36%);
        --danger: hsl(0 58% 36%);
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --surface-000: hsl(40 3% 20%);
          --surface-100: hsl(40 3% 14%);
          --surface-200: hsl(40 3% 11%);
          --surface-300: hsl(40 3% 20%);
          --text-100: hsl(45 22% 95%);
          --text-300: hsl(45 6% 62%);
          --border: hsl(45 18% 91% / 0.14);
          --control: hsl(40 3% 11%);
          --control-hover: hsl(40 3% 20%);
          --info: hsl(215 65% 60%);
          --success: hsl(150 45% 48%);
          --danger: hsl(0 76% 78%);
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        font-family:
          Inter,
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          Roboto,
          sans-serif;
        margin: 0;
        padding: 32px;
        background: var(--surface-200);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text-100);
      }

      .container {
        width: min(420px, 100%);
        background: var(--surface-100);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 28px;
        text-align: left;
        box-shadow: 0 8px 24px hsl(40 3% 8% / 0.12);
      }

      h1 {
        color: var(--text-100);
        margin: 0 0 10px;
        font-size: 22px;
        line-height: 1.25;
        font-weight: 600;
      }

      p {
        margin: 0 0 24px;
        line-height: 1.6;
        color: var(--text-300);
      }

      button {
        width: 100%;
        background: var(--control);
        color: var(--text-100);
        border: none;
        padding: 10px 14px;
        border-radius: 6px;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        transition:
          background-color 160ms ease,
          opacity 160ms ease;
      }

      button:hover {
        background: var(--control-hover);
      }

      button:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }

      .success {
        color: var(--success);
      }

      .error {
        color: var(--danger);
      }

      .mic-icon {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 42px;
        height: 42px;
        margin-bottom: 20px;
        border-radius: 999px;
        background: var(--surface-300);
        color: var(--text-100);
        font-size: 22px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="mic-icon">🎤</div>
      <h1 id="title">Enable Voice Input</h1>
      <p id="description">Browd needs microphone access to convert your speech to text.</p>
      <button id="requestPermission">Grant Microphone Permission</button>
      <p id="status"></p>
    </div>
    <script src="permission.js"></script>
  </body>
</html>
